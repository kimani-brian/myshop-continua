{% extends "shop/base.html" %}
{% load static %}

{% block content %}
<section class="page-section space-y-6">
    <header>
        <p class="text-xs uppercase tracking-[0.3em] text-gray-500">Search</p>
        <h1 class="text-3xl font-semibold">Results for "{{ query }}"</h1>
    </header>

    {% if results %}
        <div class="card-grid">
            {% for product in results %}
                {% include "components/product_card.html" with product=product %}
            {% endfor %}
        </div>
    {% else %}
        <p class="text-gray-500">No products found.</p>
    {% endif %}
</section>
{% endblock %}
