{% extends "shop/base.html" %}
{% block title %}Password Reset Sent{% endblock %}
{% block content %}
<section class="page-section text-center space-y-3">
  <span class="badge badge--accent">Check your inbox</span>
  <h2 class="text-2xl font-semibold">Email sent</h2>
  <p class="text-gray-500">If your email exists in our system, we’ve sent you a link to reset your password.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn--primary w-full sm:w-auto mx-auto">Return to login</a>
</section>
{% endblock %}
