{% extends "shop/base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white shadow-md rounded-lg p-6 mt-10">
  <h2 class="text-2xl font-semibold mb-4 text-blue-600">Set a New Password</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div>
      {{ form.new_password1.errors }}
      <input type="password" name="new_password1" placeholder="New password"
             class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      {{ form.new_password2.errors }}
      <input type="password" name="new_password2" placeholder="Confirm new password"
             class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition">
      Change password
    </button>
  </form>
</div>
{% endblock %}
