{% extends "shop/base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<section class="page-section text-center space-y-3">
  <span class="badge badge--accent">All set</span>
  <h2 class="text-2xl font-semibold">Password updated</h2>
  <p class="text-gray-500">Your password has been reset successfully. You can now log in with the new credentials.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn--primary w-full sm:w-auto mx-auto">Back to login</a>
</section>
{% endblock %}
