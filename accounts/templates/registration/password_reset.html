{% extends "shop/base.html" %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white shadow-md rounded-lg p-6 mt-10">
  <h2 class="text-2xl font-semibold mb-4 text-blue-600">Reset your password</h2>
  <p class="text-gray-600 mb-4">Enter your email address and we’ll send you a link to reset your password.</p>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.email.errors }}
    <input type="email" name="email" placeholder="Email address"
           class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition">
      Send reset link
    </button>
  </form>
</div>
{% endblock %}
